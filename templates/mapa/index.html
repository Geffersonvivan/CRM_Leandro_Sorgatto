{% extends 'base.html' %}
{% load static %}

{% block title %}Mapa Político — CRM Sorgatto{% endblock %}

{% block extra_head %}
<script src="https://cdn.jsdelivr.net/npm/d3@7.9.0/dist/d3.min.js"></script>
<style>
    .map-wrapper {
        background: #fff;
        border-radius: 12px;
        box-shadow: 0 2px 8px rgba(0,0,0,.06);
        padding: 16px;
        margin-bottom: 16px;
    }
    .map-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 10px;
        margin-bottom: 12px;
    }
    .map-title { font-size: 1.15rem; font-weight: 700; color: #1e293b; }
    .map-subtitle { font-size: .82rem; color: #64748b; margin-top: 2px; }

    /* Mode buttons */
    .mode-bar-wrap {
        display: flex;
        gap: 0;
        align-items: stretch;
    }
    .mode-bar {
        display: flex;
        gap: 0;
        border: 1px solid #d1d5db;
        border-radius: 8px 0 0 8px;
        overflow-x: auto;
        max-width: 100%;
    }
    .mode-btn {
        padding: 6px 14px;
        font-size: .78rem;
        font-weight: 600;
        white-space: nowrap;
        background: #fff;
        color: #475569;
        border: none;
        border-right: 1px solid #e5e7eb;
        cursor: pointer;
        transition: all .15s;
    }
    .mode-btn:hover { background: #f1f5f9; }
    .mode-btn.active { background: #002776; color: #fff; }

    /* Help button */
    .btn-help {
        width: 36px;
        min-width: 36px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #002776;
        color: #fff;
        border: 1px solid #002776;
        border-left: none;
        border-radius: 0 8px 8px 0;
        cursor: pointer;
        font-size: .95rem;
        font-weight: 700;
        transition: background .15s;
    }
    .btn-help:hover { background: #001d5a; }
    .btn-help.active { background: #1e40af; }

    /* Help panel */
    .help-panel {
        display: none;
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 10px;
        padding: 14px 20px;
        margin-bottom: 12px;
        position: relative;
        animation: helpSlide .2s ease-out;
    }
    .help-panel.visible { display: flex; gap: 32px; }
    @keyframes helpSlide {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .help-section { flex: 1; min-width: 0; }
    .help-section-title {
        font-size: .78rem;
        font-weight: 700;
        color: #1e293b;
        margin-bottom: 6px;
        display: flex;
        align-items: center;
        gap: 5px;
    }
    .help-section-title .icon { font-size: .85rem; }
    .help-section p {
        font-size: .78rem;
        color: #475569;
        line-height: 1.5;
        margin: 0;
    }
    .help-close {
        position: absolute;
        top: 10px;
        right: 14px;
        background: none;
        border: none;
        font-size: 1.1rem;
        color: #94a3b8;
        cursor: pointer;
        padding: 2px 6px;
        border-radius: 4px;
    }
    .help-close:hover { color: #475569; background: #e2e8f0; }

    @media (max-width: 900px) {
        .help-panel.visible { flex-direction: column; gap: 12px; }
    }

    .btn-back {
        display: none;
        align-items: center;
        gap: 6px;
        padding: 6px 16px;
        font-size: .82rem;
        font-weight: 600;
        background: #002776;
        color: #fff;
        border: none;
        border-radius: 8px;
        cursor: pointer;
    }
    .btn-back:hover { background: #001d5a; }
    .btn-back.visible { display: inline-flex; }

    /* Map container */
    #map-container {
        width: 100%;
        height: 550px;
        position: relative;
        background: #f8fafc;
        border-radius: 8px;
    }

    /* Custom dropdown de Concorrência */
    .comp-group-title {
        padding: 8px 12px;
        font-size: .74rem;
        font-weight: 800;
        color: #fff;
        background: #1e3a5f;
        text-transform: uppercase;
        letter-spacing: .8px;
        position: sticky;
        top: 0;
        z-index: 1;
        border-bottom: 1px solid #0f172a;
    }
    .comp-group-title:not(:first-child) {
        margin-top: 2px;
    }
    .comp-option {
        padding: 7px 14px;
        font-size: .8rem;
        color: #334155;
        cursor: pointer;
        transition: background .1s;
    }
    .comp-option:hover {
        background: #e0e7ff;
        color: #1e293b;
    }
    #compSearchInput:focus { border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59,130,246,.15); }
    #compSearchInput::placeholder { color: #94a3b8; }
    #compDropdownList::-webkit-scrollbar { width: 6px; }
    #compDropdownList::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
    .comp-chip {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 3px 8px;
        border-radius: 12px;
        font-size: .72rem;
        font-weight: 600;
        color: #fff;
        cursor: default;
        line-height: 1.4;
        max-width: 100%;
    }
    .comp-chip-remove {
        cursor: pointer;
        opacity: .7;
        font-size: .82rem;
        line-height: 1;
        margin-left: 2px;
    }
    .comp-chip-remove:hover { opacity: 1; }

    /* Tooltip */
    .map-tooltip {
        position: fixed;
        pointer-events: none;
        background: #fff;
        border: 1px solid #e2e8f0;
        border-radius: 10px;
        padding: 10px 14px;
        font-size: .78rem;
        box-shadow: 0 4px 12px rgba(0,0,0,.12);
        opacity: 0;
        transition: opacity .1s;
        z-index: 9999;
        max-width: 320px;
    }
    .tooltip-title { font-weight: 700; color: #1e293b; margin-bottom: 6px; font-size: .85rem; }
    .tooltip-row { display: flex; justify-content: space-between; gap: 12px; padding: 2px 0; }
    .tooltip-label { color: #64748b; }
    .tooltip-value { color: #1e293b; font-weight: 500; text-align: right; }

    /* Legend */
    .map-legend {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        padding: 10px 0 0;
        font-size: .75rem;
        color: #64748b;
    }
    .legend-item {
        display: flex;
        align-items: center;
        gap: 5px;
    }
    .legend-dot {
        width: 12px;
        height: 12px;
        border-radius: 3px;
        flex-shrink: 0;
    }

    /* SVG styles */
    #map-container svg text {
        pointer-events: none;
        user-select: none;
    }

    /* Hover effects */
    #map-container svg path.region:hover,
    #map-container svg path.city:hover {
        fill-opacity: 1 !important;
        stroke: #002776;
        stroke-width: 2.5;
    }
    #map-container svg path.transfer-city:hover {
        fill-opacity: 1 !important;
        stroke: #002776;
        stroke-width: 1.5;
    }

    /* Pulse animation for overdue demands */
    @keyframes pulse-red {
        0%, 100% { fill-opacity: 0.85; }
        50% { fill-opacity: 0.4; }
    }
    path.pulse-overdue {
        animation: pulse-red 1.5s infinite;
    }

    /* Dashed line animation for itineraries */
    @keyframes dash-march {
        to { stroke-dashoffset: -30; }
    }
    path.itinerary-animated {
        animation: dash-march 1.2s linear infinite;
    }

    /* Dashboard below map */
    .map-dashboard { margin-top: 16px; }
    .map-dashboard-hidden { display: none; }

    .dash-summary {
        display: flex;
        align-items: baseline;
        gap: 16px;
        flex-wrap: wrap;
        margin-bottom: 8px;
    }
    .dash-summary-title {
        font-size: .88rem;
        font-weight: 700;
        color: #1e293b;
    }
    .dash-summary-stats {
        display: flex;
        gap: 16px;
        font-size: .78rem;
        color: #64748b;
    }
    .dash-summary-stats span { white-space: nowrap; }

    .perf-cards {
        display: flex;
        gap: 0;
        margin: 12px 0 16px;
        border-radius: 10px;
        overflow: hidden;
    }
    .perf-card {
        flex: 1;
        padding: 14px 16px;
        color: #fff;
    }
    .perf-card-number {
        font-size: 1.6rem;
        font-weight: 800;
        line-height: 1.1;
    }
    .perf-card-label {
        font-size: .75rem;
        font-weight: 600;
        opacity: .85;
        margin-top: 2px;
    }

    .dash-table-wrap {
        overflow-x: auto;
        border: 1px solid #e2e8f0;
        border-radius: 10px;
    }
    .dash-table-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 12px 16px;
    }
    .dash-table-header h3 {
        font-size: .88rem;
        font-weight: 700;
        color: #1e293b;
        margin: 0;
    }
    .dash-table-header span {
        font-size: .75rem;
        color: #94a3b8;
    }
    .dash-table {
        width: 100%;
        border-collapse: collapse;
        font-size: .78rem;
    }
    .dash-table thead th {
        background: #f8fafc;
        padding: 8px 12px;
        text-align: left;
        font-weight: 600;
        color: #475569;
        border-top: 1px solid #e2e8f0;
        border-bottom: 1px solid #e2e8f0;
        white-space: nowrap;
    }
    .dash-table thead th.text-right { text-align: right; }
    .dash-table tbody td {
        padding: 8px 12px;
        border-bottom: 1px solid #f1f5f9;
        color: #1e293b;
    }
    .dash-table tbody td.text-right { text-align: right; }
    .dash-table tbody tr:hover { background: #f8fafc; }
    .perf-badge {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 4px;
        font-size: .7rem;
        font-weight: 700;
        color: #fff;
    }
</style>
{% endblock %}

{% block content %}
<div class="map-wrapper">
    <div class="map-header">
        <div>
            <div class="map-title">Mapa Político de Articulação</div>
            <div class="map-subtitle" id="map-location">Santa Catarina</div>
        </div>
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
            <div class="mode-bar-wrap">
                <div class="mode-bar" id="modeBar">
                    <button class="mode-btn" data-mode="eleicoes_2022">Eleições 2022</button>
                    <button class="mode-btn" data-mode="regioes">Regiões</button>
                    <button class="mode-btn" data-mode="calor">Mapa de Calor</button>
                    <button class="mode-btn" data-mode="demandas">Demandas</button>
                    <button class="mode-btn" data-mode="roteiros">Roteiros</button>
                    <button class="mode-btn" data-mode="estrategico">Estratégico</button>
                    <button class="mode-btn" data-mode="rede_pl">Rede PL</button>
                    <button class="mode-btn" data-mode="zonas">Zonas Eleitorais</button>
                    <button class="mode-btn" data-mode="transferencia">Transferência</button>
                    <button class="mode-btn" data-mode="deputados">Dep. Aliados</button>
                    <button class="mode-btn" data-mode="doacoes">Doações</button>
                    <button class="mode-btn" data-mode="concorrencia">Concorrência</button>
                </div>
                <button class="btn-help" id="btnHelp" title="O que este mapa mostra?">?</button>
            </div>
            <button class="btn-back" id="btnBack" onclick="mapApp.backToState()">
                <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
                Voltar
            </button>
        </div>
    </div>

    <!-- Painel de ajuda contextual -->
    <div class="help-panel" id="helpPanel">
        <button class="help-close" id="helpClose">&times;</button>
        <div class="help-section">
            <div class="help-section-title"><span class="icon">&#9432;</span> O que mostra</div>
            <p id="helpWhat"></p>
        </div>
        <div class="help-section">
            <div class="help-section-title"><span class="icon">&#128270;</span> Como interpretar</div>
            <p id="helpHow"></p>
        </div>
        <div class="help-section">
            <div class="help-section-title"><span class="icon">&#10024;</span> Exemplo prático</div>
            <p id="helpExample"></p>
        </div>
    </div>

    <div id="map-container">
        <!-- Seletor multi-candidato (modo Concorrência) — sobreposto dentro do mapa -->
        <div id="competicaoSelectWrap" style="display:none;position:absolute;top:14px;left:14px;z-index:500;background:rgba(255,255,255,.97);backdrop-filter:blur(2px);border:1px solid #e2e8f0;border-radius:10px;padding:12px 14px;box-shadow:0 6px 20px rgba(15,23,42,.12);width:300px;">
            <label style="display:block;font-size:.66rem;font-weight:700;color:#475569;text-transform:uppercase;letter-spacing:.6px;margin-bottom:7px;">Comparar Candidatos <span style="font-weight:500;color:#94a3b8">(até 8)</span></label>
            <!-- Search input + dropdown -->
            <input id="compSearchInput" type="text" placeholder="Buscar candidato..." autocomplete="off" style="width:100%;padding:8px 9px;border:1px solid #d0d4e4;border-radius:7px;font-size:.82rem;color:#1e293b;background:#fff;outline:none;box-sizing:border-box;" />
            <div id="compDropdownList" style="display:none;position:absolute;left:0;right:0;top:68px;max-height:340px;overflow-y:auto;background:#fff;border:1px solid #cbd5e1;border-radius:8px;box-shadow:0 12px 32px rgba(15,23,42,.18);z-index:600;"></div>
            <div id="competicaoChips" style="margin-top:8px;display:flex;flex-wrap:wrap;gap:5px;"></div>
            <div id="competicaoInfo" style="margin-top:9px;font-size:.72rem;color:#64748b;min-height:1em;"></div>
        </div>
    </div>

    <!-- Legendas dinamicas -->
    <div class="map-legend" id="mapLegend"></div>
</div>

<!-- Dashboard contextual abaixo do mapa -->
<div class="map-wrapper map-dashboard map-dashboard-hidden" id="mapDashboard"></div>

<script src="{% static 'js/map/api.js' %}"></script>
<script src="{% static 'js/map/sc-map.js' %}"></script>
<script>
(function() {
    const map = new SCMap('map-container');
    map.init();
    window.mapApp = map;

    const initialMode = '{{ mapa_param|default:"eleicoes_2022" }}';
    let currentMode = initialMode;

    // Mode buttons
    const modeBar = document.getElementById('modeBar');
    const btns = modeBar.querySelectorAll('.mode-btn');

    function setActiveBtn(mode) {
        btns.forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
    }

    btns.forEach(btn => {
        btn.addEventListener('click', () => {
            const mode = btn.dataset.mode;
            if (mode === currentMode) return;
            currentMode = mode;
            map.mapMode = mode;
            setActiveBtn(mode);
            applyMode(mode);
            updateHelp(mode);
            history.replaceState(null, '', `/mapa/?mapa=${mode}`);
        });
    });

    // ── Help panel ──────────────────────────────────────────────
    const helpData = {
        eleicoes_2022: {
            what: 'Mostra o <strong>desempenho do LS como candidato a deputado federal nas eleições de 2022</strong> em cada cidade de SC. O mapa revela onde o LS foi competitivo e onde precisa crescer, exibindo:<br><br>' +
                '<table style="width:100%;font-size:.78rem;border-collapse:collapse;margin-bottom:4px">' +
                '<tr style="border-bottom:1px solid #e2e8f0"><td style="padding:3px 0"><strong>Posição no ranking</strong></td><td style="padding-left:8px;color:#64748b">Em que lugar o LS ficou entre todos os candidatos a dep. federal naquela cidade</td></tr>' +
                '<tr style="border-bottom:1px solid #e2e8f0"><td style="padding:3px 0"><strong>Total de votos</strong></td><td style="padding-left:8px;color:#64748b">Quantidade absoluta de votos recebidos na cidade</td></tr>' +
                '<tr><td style="padding:3px 0"><strong>% dos votos válidos</strong></td><td style="padding-left:8px;color:#64748b">Participação do LS no total de votos válidos para dep. federal</td></tr>' +
                '</table>',
            how: 'Cada cidade recebe uma <strong>cor baseada na posição do LS no ranking</strong> de candidatos a deputado federal daquela cidade:<br><br>' +
                '<span style="display:inline-block;width:12px;height:12px;border-radius:2px;background:#15803d;vertical-align:middle;margin-right:4px"></span> <strong style="color:#15803d">Verde escuro</strong> — <strong>1º lugar</strong>: o LS foi o deputado federal mais votado na cidade.<br>' +
                '<span style="display:inline-block;width:12px;height:12px;border-radius:2px;background:#22c55e;vertical-align:middle;margin-right:4px"></span> <strong style="color:#22c55e">Verde</strong> — <strong>Top 3</strong>: ficou entre os 3 mais votados. Base eleitoral significativa.<br>' +
                '<span style="display:inline-block;width:12px;height:12px;border-radius:2px;background:#eab308;vertical-align:middle;margin-right:4px"></span> <strong style="color:#eab308">Amarelo</strong> — <strong>Top 5</strong>: presença intermediária, espaço para crescer.<br>' +
                '<span style="display:inline-block;width:12px;height:12px;border-radius:2px;background:#f97316;vertical-align:middle;margin-right:4px"></span> <strong style="color:#f97316">Laranja</strong> — <strong>Top 10</strong>: presença fraca, precisa de trabalho de base.<br>' +
                '<span style="display:inline-block;width:12px;height:12px;border-radius:2px;background:#ef4444;vertical-align:middle;margin-right:4px"></span> <strong style="color:#ef4444">Vermelho</strong> — <strong>11º ou pior</strong>: território adversário, pouca penetração.<br><br>' +
                'Passe o <strong>mouse</strong> para ver posição, votos e percentual. <strong>Clique na região</strong> para detalhar cidade a cidade.',
            example: '<strong>Leitura rápida:</strong> Blocos verdes são a base consolidada do LS — prioridade é manter. Blocos amarelos/laranjas são oportunidades de crescimento para 2026. Blocos vermelhos exigem estratégia de longo prazo.<br>' +
                '<strong>Exemplo:</strong> Se Lages aparece em verde escuro (1º lugar, 8.200 votos, 12% dos válidos), é reduto forte. Já Florianópolis em vermelho (15º lugar, 900 votos, 0.3%) indica que a capital precisa de investimento pesado em visibilidade.',
        },
        regioes: {
            what: 'Apresenta a <strong>divisão do estado em 21 associações de municípios</strong> (AMAs), que são a unidade geográfica base de toda a operação política. Cada associação agrupa cidades vizinhas com características e desafios em comum.<br><br>' +
                'Ao passar o mouse, você vê o <strong>resumo consolidado da região</strong>: população total, número de eleitores, quantidade de apoiadores cadastrados e a votação do LS em 2022.',
            how: 'Cada região possui uma <strong>cor fixa distinta</strong> para facilitar a identificação visual no mapa. As cores não indicam performance — servem apenas para diferenciar os limites entre regiões.<br><br>' +
                '<strong>Interações disponíveis:</strong><br>' +
                '&bull; <strong>Hover</strong> (passar o mouse) — exibe popup com dados consolidados da região<br>' +
                '&bull; <strong>Clique</strong> — faz zoom na região e mostra todas as cidades individuais com seus dados<br>' +
                '&bull; <strong>Botão voltar</strong> — retorna à visão geral do estado após o zoom',
            example: '<strong>Uso típico:</strong> Use este mapa como ponto de partida para navegar pelo estado. Clique na AMEOSC (extremo-oeste) para ver as cidades daquela associação, depois clique em uma cidade específica para acessar a ficha completa com apoiadores, lideranças e histórico.<br>' +
                '<strong>Dica:</strong> Compare regiões vizinhas olhando população e apoiadores — regiões grandes com poucos apoiadores podem ser prioridade de expansão.',
        },
        calor: {
            what: 'Mede a <strong>penetração eleitoral do LS em 2022</strong> em cada região: a porcentagem de votos que ele recebeu em relação ao <strong>total de eleitores aptos</strong> (não apenas votos válidos). Esse indicador revela o alcance real do LS junto ao eleitorado total, incluindo abstenções e votos nulos.',
            how: 'O gradiente de cores segue uma escala de intensidade que vai do frio (fraco) ao quente (forte):<br><br>' +
                '<span style="display:inline-block;width:12px;height:12px;border-radius:2px;background:#ef4444;vertical-align:middle;margin-right:4px"></span> <strong style="color:#ef4444">Vermelho</strong> — penetração muito baixa (&lt;0.5% do eleitorado)<br>' +
                '<span style="display:inline-block;width:12px;height:12px;border-radius:2px;background:#f97316;vertical-align:middle;margin-right:4px"></span> <strong style="color:#f97316">Laranja</strong> — penetração baixa (0.5% a 1%)<br>' +
                '<span style="display:inline-block;width:12px;height:12px;border-radius:2px;background:#eab308;vertical-align:middle;margin-right:4px"></span> <strong style="color:#eab308">Amarelo</strong> — penetração média (1% a 2%)<br>' +
                '<span style="display:inline-block;width:12px;height:12px;border-radius:2px;background:#84cc16;vertical-align:middle;margin-right:4px"></span> <strong style="color:#84cc16">Verde claro</strong> — penetração boa (2% a 3%)<br>' +
                '<span style="display:inline-block;width:12px;height:12px;border-radius:2px;background:#22c55e;vertical-align:middle;margin-right:4px"></span> <strong style="color:#22c55e">Verde</strong> — penetração alta (&ge;3%)<br><br>' +
                'Passe o <strong>mouse</strong> para ver o percentual exato, votos e total de eleitores.',
            example: '<strong>Como interpretar:</strong> Uma região em verde com 4% significa que 4 a cada 100 eleitores registrados votaram no LS. Uma região em vermelho com 0.3% indica que apenas 3 a cada 1.000 eleitores votaram nele.<br>' +
                '<strong>Uso estratégico:</strong> Compare o mapa de calor com o mapa de Rede PL. Regiões vermelhas onde o PL já tem estrutura forte (azul escuro na Rede PL) indicam potencial desperdiçado — a rede existe mas os votos não vieram. Já regiões verdes com PL fraco sugerem voto espontâneo que pode ser consolidado com estrutura.',
        },
        demandas: {
            what: 'Painel de <strong>acompanhamento de demandas e tarefas políticas</strong> distribuídas por região. Cada tarefa tem prazo e responsável, e o mapa mostra visualmente quais regiões estão com pendências atrasadas, em dia ou sem demandas registradas.<br><br>' +
                'Inclui demandas como: visitas agendadas, reuniões com lideranças, entregas de materiais, articulações políticas e follow-ups.',
            how: 'As regiões são coloridas pelo <strong>status mais urgente</strong> das suas tarefas:<br><br>' +

    // ── Demandas Dashboard ─────────────────────────────────────
    function renderDemandasDashboard(data) {
        const items = Array.isArray(data) ? data : [];
        const totalOverdue = items.reduce((s, r) => s + (r.overdue || 0), 0);
        const totalActive = items.reduce((s, r) => s + (r.active || 0), 0);
        const totalCompleted = items.reduce((s, r) => s + (r.completed || 0), 0);

        let html = '<div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:12px;">';
        html += '<span style="font-size:.88rem;font-weight:700;color:#1e293b;">Status das Demandas</span>';
        html += '<span class="legend-item"><span class="legend-dot" style="background:#22c55e"></span>Em dia</span>';
        html += '<span class="legend-item"><span class="legend-dot" style="background:#eab308"></span>Proximo do prazo</span>';
        html += '<span class="legend-item"><span class="legend-dot" style="background:#ef4444"></span>Em atraso</span>';
        html += '<span class="legend-item"><span class="legend-dot" style="background:#d1d5db"></span>Sem demandas</span>';
        html += '</div>';

        // Summary stats
        html += '<div class="dash-summary-stats" style="margin-bottom:12px">';
        html += `<span style="color:#ef4444;font-weight:600">${totalOverdue} em atraso</span>`;
        html += `<span>${totalActive} ativas</span>`;
        html += `<span>${totalCompleted} concluidas</span>`;
        html += '</div>';

        // Table
        html += '<div class="dash-table-wrap"><div class="dash-table-header">';
        html += `<h3>Demandas por Regiao</h3><span>${items.length} regioes</span>`;
        html += '</div><table class="dash-table"><thead><tr>';
        html += '<th>Regiao</th><th>Status</th><th class="text-right">Total</th>';
        html += '<th class="text-right">Ativas</th><th class="text-right">Vencidas</th>';
        html += '<th class="text-right">Concluidas</th>';
        html += '</tr></thead><tbody>';

        const sorted = [...items].sort((a, b) => (b.overdue || 0) - (a.overdue || 0));
        for (const r of sorted) {
            const statusColor = r.status === 'overdue' ? '#ef4444' : r.status === 'ok' ? '#22c55e' : '#d1d5db';
            const statusLabel = r.status === 'overdue' ? 'Em atraso' : r.status === 'ok' ? 'Em dia' : 'Sem demandas';
            html += '<tr>';
            html += `<td><strong>${r.name}</strong></td>`;
            html += `<td><span class="perf-badge" style="background:${statusColor}">${statusLabel}</span></td>`;
            html += `<td class="text-right">${r.total || 0}</td>`;
            html += `<td class="text-right">${r.active || 0}</td>`;
            html += `<td class="text-right" style="color:${r.overdue > 0 ? '#ef4444' : 'inherit'};font-weight:${r.overdue > 0 ? '700' : 'normal'}">${r.overdue || 0}</td>`;
            html += `<td class="text-right">${r.completed || 0}</td>`;
            html += '</tr>';
        }
        html += '</tbody></table></div>';
        dashEl.innerHTML = html;
        dashEl.classList.remove('map-dashboard-hidden');
    }

        const sorted = [...cities].sort((a, b) => b.score - a.score);
        for (const c of sorted) {
            const cls = c.classification || 'neutro';
            html += '<tr>';
            html += `<td><strong>${c.name}</strong></td>`;
            html += `<td>${c.region_name}</td>`;

    // ── Mode switching ──────────────────────────────────────────
    // ── Concorrência: seletor multi-candidato com busca ─────────
    const compWrap = document.getElementById('competicaoSelectWrap');
    const compInput = document.getElementById('compSearchInput');
    const compList = document.getElementById('compDropdownList');
    const compInfo = document.getElementById('competicaoInfo');
    const compChips = document.getElementById('competicaoChips');
    let compLoaded = false;
    let compCandidatesList = [];
    const CONC_PALETTE_DARKS = ['#14532d','#1e3a8a','#991b1b','#92400e','#581c87','#155e75','#9f1239','#3f6212'];

    function toggleCompDropdown(show) {
        compList.style.display = show ? 'block' : 'none';
        if (compInput) compInput.style.borderColor = show ? '#3b82f6' : '#d0d4e4';
    }

    function normalizeStr(s) {
        return (s || '').normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLowerCase();
    }

    function renderCompList(filter) {
        const q = normalizeStr(filter);
        const words = q.split(/\s+/).filter(w => w.length > 0);
        compList.innerHTML = '';
        const selectedKeys = new Set((map._concCandidates || []).map(c => c.key));

        for (const label of ['Governador', 'Senador', 'Deputado Federal', 'Deputado Estadual']) {
            const arr = compCandidatesList.filter(c => c.cargo_label === label && !selectedKeys.has(c.key));
            const filtered = words.length
                ? arr.filter(c => {
                    const text = normalizeStr(`${c.nome} ${c.partido}`);
                    return words.every(w => text.includes(w));
                })
                : arr;
            if (!filtered.length) continue;

            const title = document.createElement('div');
            title.className = 'comp-group-title';
            title.textContent = `${label}  ·  ${filtered.length}`;
            compList.appendChild(title);
            for (const c of filtered) {
                const opt = document.createElement('div');
                opt.className = 'comp-option';
                opt.dataset.key = c.key;
                if (words.length) {
                    // Highlight each matching word
                    let display = `${c.nome} — ${c.partido}`;
                    for (const w of words) {
                        const norm = normalizeStr(display);
                        const idx = norm.indexOf(w);
                        if (idx >= 0) {
                            display = display.substring(0, idx)
                                + '\x00' + display.substring(idx, idx + w.length) + '\x01'
                                + display.substring(idx + w.length);
                        }
                    }
                    opt.innerHTML = display
                        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
                        .replace(/\x00/g, '<strong style="color:#1e3a8a;background:#dbeafe;border-radius:2px;padding:0 1px">')
                        .replace(/\x01/g, '</strong>');
                } else {
                    opt.textContent = `${c.nome} — ${c.partido}`;
                }
                compList.appendChild(opt);
            }
        }

        if (!compList.children.length) {
            const empty = document.createElement('div');
            empty.style.cssText = 'padding:16px;text-align:center;color:#94a3b8;font-size:.8rem';
            empty.textContent = q ? `Nenhum candidato encontrado para "${filter}"` : 'Nenhum candidato disponível';
            compList.appendChild(empty);
        }
    }

    if (compInput) {
        compInput.addEventListener('focus', () => {
            renderCompList(compInput.value);
            toggleCompDropdown(true);
        });
        compInput.addEventListener('input', () => {
            renderCompList(compInput.value);
            toggleCompDropdown(true);
        });
        compInput.addEventListener('click', (e) => e.stopPropagation());
    }
    document.addEventListener('click', () => toggleCompDropdown(false));
    if (compList) {
        compList.addEventListener('click', async (e) => {
            e.stopPropagation();
            const opt = e.target.closest('.comp-option');
            if (!opt) return;
            const key = opt.dataset.key;
            toggleCompDropdown(false);
            compInput.value = '';
            if ((map._concCandidates || []).find(c => c.key === key)) return;
            if ((map._concCandidates || []).length >= 8) {
                compInfo.textContent = 'Máximo de 8 candidatos atingido.';
                return;
            }
            compInfo.textContent = 'Carregando…';
            await map.addConcorrenciaCandidate(key);
            renderCompChips();
            renderConcorrenciaLegend();
            updateCompInfo();
        });
    }

    async function ensureCompCandidates() {
        if (compLoaded) return;
        compLoaded = true;
        try {
            const data = await API.competicao.candidatos();
            compCandidatesList = data.candidatos;
        } catch (e) { console.error('Erro ao carregar candidatos:', e); }
    }

    function renderCompChips() {
        compChips.innerHTML = '';
        const candidates = map._concCandidates || [];
        for (const cand of candidates) {
            const color = CONC_PALETTE_DARKS[cand.paletteIdx] || '#475569';
            const chip = document.createElement('span');
            chip.className = 'comp-chip';
            chip.style.background = color;
            const nameShort = cand.data.candidato.length > 22
                ? cand.data.candidato.substring(0, 20) + '…'
                : cand.data.candidato;
            chip.innerHTML = `${nameShort} <span class="comp-chip-remove" data-key="${cand.key}">&times;</span>`;
            compChips.appendChild(chip);
        }
        compChips.querySelectorAll('.comp-chip-remove').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const key = btn.dataset.key;
                map.removeConcorrenciaCandidate(key);
                renderCompChips();
                renderConcorrenciaLegend();
                updateCompInfo();
            });
        });
    }

    function renderConcorrenciaLegend() {
        const el = document.getElementById('mapLegend');
        const candidates = map._concCandidates || [];
        if (!candidates.length) { el.innerHTML = ''; return; }
        el.innerHTML = candidates.map(cand => {
            const color = CONC_PALETTE_DARKS[cand.paletteIdx] || '#475569';
            const nome = cand.data.candidato;
            return `<span class="legend-item"><span class="legend-dot" style="background:${color}"></span>${nome}</span>`;
        }).join('') + '<span class="legend-item"><span class="legend-dot" style="background:#e2e8f0"></span>Sem votos</span>';
    }

    function updateCompInfo() {
        const candidates = map._concCandidates || [];
        if (!candidates.length) {
            compInfo.textContent = '';
            return;
        }
        const parts = candidates.map(c => {
            const color = CONC_PALETTE_DARKS[c.paletteIdx] || '#475569';
            return `<span style="color:${color};font-weight:700">${c.data.total_votos.toLocaleString('pt-BR')}</span>`;
        });
        compInfo.innerHTML = candidates.length === 1
            ? `${parts[0]} votos · ${candidates[0].data.cidades_com_voto} cidades`
            : `${candidates.length} candidatos selecionados`;
    }

    async function applyMode(mode) {
        renderLegend(mode);
        renderDashboard(mode);
        map.heatmapEnabled = false;
        map.demandsEnabled = false;
        map.itinerariesEnabled = false;
        map.strategicEnabled = false;
        map.plNetworkEnabled = false;
        map.zoneRankingEnabled = false;
        map.voteTransferEnabled = false;
        map.neighborDeputiesEnabled = false;
        map.elections2022Enabled = false;
        map.doacoesEnabled = false;
        map.concorrenciaEnabled = false;

        // Limpar concorrência ao sair do modo
        if (mode !== 'concorrencia') {
            compWrap.style.display = 'none';
            map.setConcorrencia(false);
        }

        // O seletor só aparece no modo Concorrência; o mapa começa limpo até escolher.
        if (mode === 'concorrencia') {
            compWrap.style.display = 'block';
            ensureCompCandidates();
            toggleCompDropdown(false);
            compInput.value = '';
            compInfo.textContent = '';
            map.clearConcorrenciaCandidates();
            compChips.innerHTML = '';
            document.getElementById('mapLegend').innerHTML = '';
        }

        switch(mode) {
            case 'regioes':
                map.setHeatmap(false);
                break;
            case 'calor':
                map.setHeatmap(true);
                break;
            case 'demandas':
                await map.setDemands(true);
                break;
            case 'roteiros':
                await map.setItineraries(true, false);
                break;
            case 'estrategico':
                await map.setStrategic(true);
                break;
            case 'rede_pl':
                await map.setPLNetwork(true);
                break;
            case 'zonas':
                await map.setZoneRanking(true);
                break;
            case 'transferencia':
                await map.setVoteTransfer(true);
                break;
            case 'deputados':
                await map.setNeighborDeputies(true);
                break;
            case 'eleicoes_2022':
                await map.setElections2022(true);
                break;
            case 'doacoes':
                await map.setDoacoes(true);
                break;
            case 'concorrencia':
                await map.setConcorrencia(true);
                break;
        }

    }

    // ── Navigation ──────────────────────────────────────────────
    map.onRegionClick = function(slug) {
        map.zoomToRegion(slug);
        document.getElementById('btnBack').classList.add('visible');
        document.getElementById('map-location').textContent = 'Regiao: ' + slug.toUpperCase();
    };

    const origBack = map.backToState.bind(map);
    map.backToState = function() {
        origBack();
        document.getElementById('btnBack').classList.remove('visible');
        document.getElementById('map-location').textContent = 'Santa Catarina';
    };

    // ── Init ────────────────────────────────────────────────────
    setActiveBtn(currentMode);
    map.mapMode = currentMode;
    map.loadState().then(() => {
        applyMode(currentMode);
    }).catch(err => {
        document.getElementById('map-container').innerHTML =
            '<div style="padding:40px;text-align:center;color:#ef4444;font-size:.9rem;">Erro ao carregar mapa: ' + err.message + '</div>';
    });
})();
</script>
{% endblock %}
